<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOSA — Moved</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #06080f;
      color: #d8dff0;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #4ec9f0;
      margin-bottom: 1.4rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 1rem;
      color: #eef2ff;
    }

    p {
      font-size: .95rem;
      line-height: 1.7;
      color: #7a8499;
      margin-bottom: .6rem;
    }

    .urls {
      margin: 1.8rem 0;
      border-left: 2px solid #1c2235;
      padding-left: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    .url-row {
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
    }

    .url-row .label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #444c66;
      display: block;
      margin-bottom: .15rem;
    }

    .url-row.old { color: #444c66; text-decoration: line-through; }
    .url-row.new { color: #4ec9f0; }

    a.btn {
      display: inline-block;
      margin-top: .4rem;
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #06080f;
      background: #4ec9f0;
      padding: .75rem 1.6rem;
      transition: background .15s;
    }
    a.btn:hover { background: #7adcf8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">DOSA &mdash; Directory of Open Space Autonomy</div>
    <h1>This site has moved.</h1>
    <p>DOSA has migrated from its old subdomain. Everything is intact at the new address.</p>

    <div class="urls">
      <div class="url-row old">
        <span class="label">Old</span>
        dosa.emtypyie.in
      </div>
      <div class="url-row new">
        <span class="label">New</span>
        emtypyie.in/dosa
      </div>
    </div>

    <a class="btn" href="https://emtypyie.in/dosa">Take me there</a>
  </div>
</body>
</html>
